# Reuse common defaults
_base: base.yaml

# EdgeCalib v2.0 - OSDaR23 数据集配置
# 使用方式: python run_pipeline.py --config configs/osdar23.yaml --frame-ids 12

# ========================================
# 数据路径配置
# ========================================
data:
  dataset_format: "osdar23"
  # ★ 修改这里指向你的序列根目录
  osdar_sequence_root: "/gz-data/OSDaR23/1_calibration_1.1"
  image_sensor: "rgb_center"        # rgb_center / rgb_left / rgb_right
  osdar_duplicate_policy: "latest"  # latest | earliest

  # 以下三项由 osdar_sequence_root 自动推导，留空即可
  image_dir: ""
  velodyne_dir: ""
  calib_file: ""
  velo_to_cam_file: ""

  # 输出目录（独立于 KITTI 的 result/，避免混淆）
  result_dir: "result_osdar23"
  sam_output_dir: "result_osdar23/sam_features"
  lidar_output_dir: "result_osdar23/lidar_features"
  calib_output_dir: "result_osdar23/calibration"
  visual_output_dir: "result_osdar23/visualization"
  image_features_output_dir: "result_osdar23/image_features"
  bev_init_output_dir: "result_osdar23/bev_init"
  refinement_output_dir: "result_osdar23/refinement"

# OSDaR23 数据集元信息（供 BEV / 语义流水线使用）
dataset:
  reference_plane: rail_top
  reference_z: 0.0

# ========================================
# 帧选择配置
# ========================================
frames:
  # frames.mode=all 时由 OSDaRResolver 自动枚举 counter；
  # 建议调试时先用 select + 单帧
  mode: "select"
  frame_ids: [12]
  fusion_window: 1   # 单帧验证时设为 1；多帧融合建议 3~5

sam:
  mask_alignment:
    output_dir: "result_osdar23/mask_alignment"

# Phase 1+ 图像 / BEV / 语义标定覆盖（算法占位阶段默认仍关闭，与 base 一致）
image_features:
  bottom_crop_ratio_for_edges: 0.0
  keep_diagonal_lines: true
  restrict_lsd_by_semantics: true

bev:
  x_range: [0.0, 100.0]
  y_range: [-25.0, 25.0]
  z_range: [-1.5, 6.0]
  resolution: 0.05
  use_rail_plane_prior: true
  near_ground_band: [-0.25, 0.35]

semantic_calib:
  class_weights:
    rail: 4.0
    ballast: 2.0
    pole: 2.0
    signal: 2.5
    platform: 2.0
    building: 1.2
    road: 0.6
    vehicle: 1.0
    vegetation: 0.2
    sky: 0.0

# ========================================
# LiDAR 特征提取配置（针对 OSDaR23 点云密度微调）
# ========================================
lidar:
  voxel_size: 0.25
  normal_k: 30
  pca_radius: 0.6
  ground_z_min: -2.5
  ground_z_max: 0.4
  rail_ransac_threshold: 0.08
  rail_max_lines: 2
  pole_z_min: -1.0
  pole_z_max: 3.5
  pole_ransac_threshold: 0.15
  pole_vertical_tolerance: 0.15
  pole_max_lines: 60
  ndt:
    transformation_epsilon: 0.01
    step_size: 0.1
    resolution: 1.0
    max_iterations: 35
  temporal_filter:
    position_threshold: 0.3
    static_weight: 0.9
    dynamic_weight: 0.1
  phase3:
    enabled: true
    save_semantic_points: true
    save_bev_maps: true
    reference_plane_z: 0.0
    rail_band_zmin: -0.5
    rail_band_zmax: 0.5
    bev_xmin: 0.0
    bev_xmax: 100.0
    bev_ymin: -25.0
    bev_ymax: 25.0
    bev_resolution: 0.2

# ========================================
# 标定优化配置
# ========================================
calibration:
  # 初始外参由 OSDaR23 calibration.txt 自动读取，这里作为 fallback
  initial_extrinsic:
    rotation: [0.0, 0.0, 0.0]
    translation: [0.0, 0.0, 0.0]

  ab_experiment:
    opt_translation: true
    use_line_constraint: false
    line_match_threshold: 50
    line_soft_penalty: false
    line_soft_cap: 100
    t_prior_weight: 20
    w_consistency: 0.0
    coarse_angle_range: 0.18
    coarse_angle_step: 0.05
    coarse_tx_range: 0.60
    coarse_tx_step: 0.05
    coarse_ty_range: 0.60
    coarse_ty_step: 0.10
    coarse_tz_range: 1.00
    coarse_tz_step: 0.10
    fine_margin_switch_inimage: 0.15
    fine_margin_low: 4
    fine_margin_high: 12
    t_prior_disable_inimage_thresh: 0.05
    t_prior_weaken_inimage_thresh: 0.15
    t_prior_weaken_factor: 0.35
    t_prior_disable_oob_thresh: 0.70
    t_prior_weaken_oob_thresh: 0.45
    t_prior_weaken_oob_factor: 0.35
    log_line_debug: false
