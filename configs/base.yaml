# EdgeCalib v2.0 - Base config shared by datasets
#
# Dataset-specific configs should include this file via:
#   _base: base.yaml

# ========================================
# 输出路径（所有结果统一保存在 result_dir 下）
# ========================================
data:
  result_dir: "result"
  sam_output_dir: "result/sam_features"
  lidar_output_dir: "result/lidar_features"
  calib_output_dir: "result/calibration"
  visual_output_dir: "result/visualization"
  # Phase 1+ 扩展输出目录（与 result_dir 组合使用，可由数据集配置覆盖）
  image_features_output_dir: "result/image_features"
  bev_init_output_dir: "result/bev_init"
  refinement_output_dir: "result/refinement"

# ========================================
# 帧选择配置
# ========================================
frames:
  mode: "select"
  frame_ids: [0]
  fusion_window: 3

# ========================================
# SAM 特征提取配置
# ========================================
sam:
  checkpoint_path: "/gz-data/model/sam_vit_h_4b8939.pth"
  model_type: "vit_h"
  feature_plugin: "sam_subprocess"
  points_per_side: 16
  pred_iou_thresh: 0.86
  stability_score_thresh: 0.92
  min_mask_region_area: 500
  heuristics:
    min_mask_area_ratio: 0.001
    max_background_area_ratio: 0.15
    sky_mask_bottom_ratio: 0.3
    ground_region_top_ratio: 0.5
    flat_ground_aspect_ratio: 3.0
    structural_aspect_ratio: 3.0
    contour_stddev_threshold: 10.0
    min_arc_length_ratio: 0.06
    sky_min_line_length_ratio: 0.03
    fused_top_black_ratio: 0.20
    fused_bottom_black_ratio: 0.80
    distance_max_ratio: 0.15
  mask_alignment:
    enabled: false
    output_dir: "result/mask_alignment"

# ========================================
# LiDAR 特征提取配置
# ========================================
lidar:
  voxel_size: 0.1
  normal_k: 20
  pca_radius: 0.5
  ground_z_min: -3.0
  ground_z_max: -1.5
  rail_ransac_threshold: 0.15
  rail_max_lines: 2
  pole_z_min: -1.0
  pole_z_max: 5.0
  pole_ransac_threshold: 0.2
  pole_vertical_tolerance: 0.2
  pole_max_lines: 5
  ndt:
    enabled: true
    transformation_epsilon: 0.01
    step_size: 0.1
    resolution: 1.0
    max_iterations: 30
  temporal_filter:
    enabled: true
    position_threshold: 0.5
    projection_threshold: 0.5
    static_weight: 1.0
    dynamic_weight: 0.1
  # Phase 3：LiDAR-BEV、语义点、BEV 轨/聚类立柱（由 lidar_extractor 新路径生成）
  phase3:
    enabled: false
    save_semantic_points: true
    save_bev_maps: true
    reference_plane_z: 0.0
    rail_band_zmin: -0.5
    rail_band_zmax: 0.5
    bev_xmin: 0.0
    bev_xmax: 100.0
    bev_ymin: -25.0
    bev_ymax: 25.0
    bev_resolution: 0.2
    rail_bev_prob_thresh: 0.12
    rail_bev_min_cells: 40.0
    rail_bev_smooth_k: 5
    rail_bev_max_segments: 6
    vert_cluster_tolerance: 0.35
    vert_min_cluster: 25
    use_legacy_range_image: false
    bev_edge_gradient_ratio: 0.35

# ========================================
# 标定优化配置
# ========================================
calibration:
  constraint_adapter: "legacy_env_constraints"
  extrinsic_init:
    target_camera: "rgb_center"
  initial_extrinsic:
    rotation: [0.0, 0.0, 0.0]
    translation: [0.0, -0.3, 1.8]
  temporal_validation:
    enabled: false
    smoothness_threshold: 0.05
    history_frames: 3
    min_confidence: 0.7
    history_file: "calib_history.txt"
  ab_experiment:
    opt_translation: true
    t_prior_weight: 20
    w_consistency: 0.0
    coarse_angle_range: 0.15
    coarse_angle_step: 0.05
    coarse_tx_range: 0.10
    coarse_tx_step: 0.05
    coarse_ty_range: 0.30
    coarse_ty_step: 0.15
    coarse_tz_range: 0.30
    coarse_tz_step: 0.15
    fine_margin_switch_inimage: 0.03
    fine_margin_low: 400
    fine_margin_high: 400
    t_prior_disable_inimage_thresh: 0.03
    t_prior_weaken_inimage_thresh: 0.08
    t_prior_weaken_factor: 0.1
    t_prior_disable_oob_thresh: 0.65
    t_prior_weaken_oob_thresh: 0.35
    t_prior_weaken_oob_factor: 0.1
    log_line_debug: false

# ========================================
# 可视化配置
# ========================================
visualization:
  # Phase 7：额外生成 BEV/语义/精修诊断拼图
  enable_diag_panels: true
  point_size: 2
  line_width: 2
  show_edges: true
  show_lines: true
  show_projections: true

# ========================================
# 图像特征前端（语义优先流水线；默认关闭以保持旧行为）
# ========================================
image_features:
  enabled: true
  enable_semantic_probs: true
  enable_edges: true
  enable_lines: false
  enable_rail_region: true
  semantic_classes: [rail, ballast, pole, signal, platform, building, road, vehicle, vegetation, sky]
  save_logits: true
  rail_class_names: [rail, ballast]
  vertical_structure_classes: [pole, signal]
  bottom_crop_ratio_for_edges: 0.0
  # Phase 0 (sam_2d): rail region / centerline params (LSD removed as main rail feature)
  rail_seed_threshold: 0.42
  rail_support_threshold: 0.22
  rail_mask_min_area: 400
  rail_close_kernel: 9
  rail_open_kernel: 5
  rail_top_ignore_ratio: 0.18
  rail_bottom_keep_ratio: 0.75
  rail_component_min_height_ratio: 0.05
  rail_skeleton_min_length_px: 40
  rail_dist_max_ratio: 0.08
  rail_weight_dilate_kernel: 9

# ========================================
# BEV 粗初始化（默认关闭）
# ========================================
bev:
  enabled: true
  x_range: [0.0, 80.0]
  y_range: [-20.0, 20.0]
  z_range: [-2.0, 5.0]
  resolution: 0.1
  channels: [density, max_height, min_height, mean_height, intensity, verticality, rail_prob]
  optimize_dofs: [yaw, tx, ty]
  rail_prior_weight: 1.0
  pole_prior_weight: 0.6
  # Phase 4：bev_initializer 搜索范围（度 / 米），可由环境变量 EDGECALIB_BEV_* 覆盖
  yaw_min_deg: -6.0
  yaw_max_deg: 6.0
  yaw_step_deg: 1.0
  tx_min_m: -2.0
  tx_max_m: 2.0
  ty_min_m: -2.0
  ty_max_m: 2.0
  trans_step_m: 0.5
  initializer_binary: ""

# ========================================
# 语义概率场标定（默认关闭）
# ========================================
semantic_calib:
  enabled: true
  # 语义链路启用时默认不允许静默回退 legacy，避免“看似成功但 breakdown 全 0”。
  allow_legacy_fallback: false
  pyramid_scales: [1.0, 0.5, 0.25]
  semantic_js_weight: 3.0
  histogram_weight: 0.5
  edge_weight: 1.0
  rail_weight: 1.2
  anchor_fixed_sampling: true
  direction_aware_yaw_weighting: true
  class_weights:
    rail: 3.0
    ballast: 2.0
    pole: 2.0
    signal: 2.0
    platform: 1.5
    building: 1.0
    road: 0.8
    vehicle: 1.0
    vegetation: 0.2
    sky: 0.0

# ========================================
# 多帧滑动窗口精修（默认关闭）
# ========================================
refine:
  enabled: true
  window_size: 5
  min_observability_score: 0.35
  max_pose_jump_deg: 0.8
  max_pose_jump_m: 0.15
  temporal_smoothing_lambda: 0.4
  update_stride: 1

