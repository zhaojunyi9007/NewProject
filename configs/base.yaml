# EdgeCalib v2.0 - Base config shared by datasets
#
# Dataset-specific configs should include this file via:
#   _base: base.yaml

# ========================================
# 输出路径（所有结果统一保存在 result_dir 下）
# ========================================
data:
  result_dir: "result"
  sam_output_dir: "result/sam_features"
  lidar_output_dir: "result/lidar_features"
  calib_output_dir: "result/calibration"
  visual_output_dir: "result/visualization"

# ========================================
# 帧选择配置
# ========================================
frames:
  mode: "select"
  frame_ids: [0]
  fusion_window: 3

# ========================================
# SAM 特征提取配置
# ========================================
sam:
  checkpoint_path: "/gz-data/model/sam_vit_h_4b8939.pth"
  model_type: "vit_h"
  feature_plugin: "sam_subprocess"
  points_per_side: 16
  pred_iou_thresh: 0.86
  stability_score_thresh: 0.92
  min_mask_region_area: 500
  heuristics:
    min_mask_area_ratio: 0.001
    max_background_area_ratio: 0.15
    sky_mask_bottom_ratio: 0.3
    ground_region_top_ratio: 0.5
    flat_ground_aspect_ratio: 3.0
    structural_aspect_ratio: 3.0
    contour_stddev_threshold: 10.0
    min_arc_length_ratio: 0.06
    global_min_line_length_ratio: 0.015
    ground_min_line_length_ratio: 0.06
    sky_min_line_length_ratio: 0.03
    fused_top_black_ratio: 0.20
    fused_bottom_black_ratio: 0.80
    distance_max_ratio: 0.15
  mask_alignment:
    enabled: false
    output_dir: "result/mask_alignment"

# ========================================
# LiDAR 特征提取配置
# ========================================
lidar:
  voxel_size: 0.1
  normal_k: 20
  pca_radius: 0.5
  ground_z_min: -3.0
  ground_z_max: -1.5
  rail_ransac_threshold: 0.15
  rail_max_lines: 2
  pole_z_min: -1.0
  pole_z_max: 5.0
  pole_ransac_threshold: 0.2
  pole_vertical_tolerance: 0.2
  pole_max_lines: 5
  ndt:
    enabled: true
    transformation_epsilon: 0.01
    step_size: 0.1
    resolution: 1.0
    max_iterations: 30
  temporal_filter:
    enabled: true
    position_threshold: 0.5
    static_weight: 1.0
    dynamic_weight: 0.1

# ========================================
# 标定优化配置
# ========================================
calibration:
  constraint_adapter: "legacy_env_constraints"
  extrinsic_init:
    target_camera: "cam2"
  initial_extrinsic:
    rotation: [0.0, 0.0, 0.0]
    translation: [0.0, -0.3, 1.8]
  temporal_validation:
    enabled: false
    smoothness_threshold: 0.05
    history_frames: 3
    min_confidence: 0.7
    history_file: "calib_history.txt"
  ab_experiment:
    opt_translation: true
    use_line_constraint: false
    line_match_threshold: 50
    line_soft_penalty: false
    line_soft_cap: 100
    t_prior_weight: 20
    w_consistency: 0.0
    coarse_angle_range: 0.15
    coarse_angle_step: 0.05
    coarse_tx_range: 0.10
    coarse_tx_step: 0.05
    coarse_ty_range: 0.30
    coarse_ty_step: 0.15
    coarse_tz_range: 0.30
    coarse_tz_step: 0.15
    fine_margin_switch_inimage: 0.03
    fine_margin_low: 400
    fine_margin_high: 400
    t_prior_disable_inimage_thresh: 0.03
    t_prior_weaken_inimage_thresh: 0.08
    t_prior_weaken_factor: 0.1
    t_prior_disable_oob_thresh: 0.65
    t_prior_weaken_oob_thresh: 0.35
    t_prior_weaken_oob_factor: 0.1
    log_line_debug: false

# ========================================
# 可视化配置
# ========================================
visualization:
  point_size: 2
  line_width: 2
  show_edges: true
  show_lines: true
  show_projections: true

