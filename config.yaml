# EdgeCalib v2.0 配置文件

# ========================================
# 数据路径配置
# ========================================
data:
  # KITTI格式数据路径
  velodyne_dir: "/gz-data/dataset/2011_09_26/2011_09_26_drive_0001_sync/velodyne_points/data"   # 点云数据目录
  image_dir: "/gz-data/dataset/2011_09_26/2011_09_26_drive_0001_sync/image_02/data"             # 图像数据目录
  calib_file: "/gz-data/dataset/2011_09_26/calib_cam_to_cam.txt"     # 标定文件
  velo_to_cam_file: "/gz-data/dataset/2011_09_26/calib_velo_to_cam.txt"  # LiDAR->Camera外参文件

  # 输出路径（所有结果统一保存在result目录下）
  result_dir: "result"
  
  # 结果子目录
  sam_output_dir: "result/sam_features"       # SAM特征输出
  lidar_output_dir: "result/lidar_features"   # LiDAR特征输出
  calib_output_dir: "result/calibration"      # 标定结果输出
  visual_output_dir: "result/visualization"   # 可视化结果输出

# ========================================
# 帧选择配置
# ========================================
frames:
  # 处理模式: "all" (所有帧) 或 "select" (指定帧)
  mode: "select"
  
  # 当mode="select"时，指定要处理的帧ID列表
  # 例如: [0, 10, 20, 30] 表示处理第0, 10, 20, 30帧
  frame_ids: [89]
  
  # 多帧融合配置
  fusion_window: 3  # 每次融合的帧数 (Three-in-one: 当前帧 + 前N-1帧)

# ========================================
# SAM 特征提取配置
# ========================================
sam:
  checkpoint_path: "/gz-data/model/sam_vit_h_4b8939.pth"
  model_type: "vit_h"
  points_per_side: 16  # 16x16 网格提示
  pred_iou_thresh: 0.86
  stability_score_thresh: 0.92

# ========================================
# LiDAR 特征提取配置
# ========================================
lidar:
  # 降采样
  voxel_size: 0.1  # 体素大小 (m)
  
  # 法向量估计
  normal_k: 20  # K近邻数量
  
  # PCA语义分类
  pca_radius: 0.5  # PCA搜索半径 (m)
  
  # 地面区域 (铁轨提取)
  ground_z_min: -3.0
  ground_z_max: -1.5
  rail_ransac_threshold: 0.15  # RANSAC容差 (m)
  rail_max_lines: 2  # 最多提取铁轨数量
  
  # 立柱区域
  pole_z_min: -1.0
  pole_z_max: 5.0
  pole_ransac_threshold: 0.2
  pole_vertical_tolerance: 0.2  # 垂直度容差 (rad)
  pole_max_lines: 5  # 最多提取立柱数量
  
  # NDT多帧融合
  ndt:
    enabled: true
    transformation_epsilon: 0.01
    step_size: 0.1
    resolution: 1.0
    max_iterations: 30
  
  # 时空一致性加权
  temporal_filter:
    enabled: true
    position_threshold: 0.5  # 位置一致性阈值 (m)
    static_weight: 1.0       # 静态物体权重
    dynamic_weight: 0.1      # 动态物体权重

# ========================================
# 标定优化配置
# ========================================
calibration:
  # 初始外参（如果为空则使用粗搜索结果）
  initial_extrinsic:
    rotation: [0.0, 0.0, 0.0]      # rx, ry, rz (angle-axis)
    translation: [0.0, -0.3, 1.8]  # tx, ty, tz (m)
  
  # 粗标定
  coarse:
    iterations: 1000  # 随机搜索次数
    angle_range: 0.15  # 角度搜索范围 (rad, ±8.6度)
    position_range: 0.8  # 位置搜索范围 (m)
    use_edge_attraction: true  # 使用边缘吸引场
    use_semantic_score: true   # 使用语义一致性得分
  
  # 精细优化
  fine:
    enabled: true
    max_iterations: 100
    huber_loss_threshold: 5.0  # Huber核函数阈值
    line_match_threshold: 50.0  # 线匹配阈值 (pixels)
  
  # 置信度检查与时序平滑
  temporal_validation:
    enabled: true
    smoothness_threshold: 0.05  # 参数变化阈值
    history_frames: 3  # 历史帧数量
    min_confidence: 0.7  # 最小置信度

  # A/B实验参数（会被 run_pipeline.py 传给 optimizer 环境变量）
  ab_experiment:
    # 是否优化平移（true/false）
    opt_translation: true
    # 是否启用线约束（建议默认 false，待线匹配稳定后再开启）
    use_line_constraint: false
    # 线匹配阈值（像素）
    line_match_threshold: 50
    # 线约束软惩罚（避免 unmatched 全部归零）
    line_soft_penalty: false
    line_soft_cap: 100
    # 平移先验权重（0 表示关闭）
    t_prior_weight: 20
    # 语义一致性权重（0~1）
    w_consistency: 0.0
    # Coarse阶段 y/z 平移局部搜索范围（m），0 表示关闭
    coarse_ty_range: 0.0
    coarse_tz_range: 0.0
    # Coarse阶段 x 平移局部搜索范围（m），0 表示关闭（默认不改变主流程）
    coarse_tx_range: 0.05
    # Coarse阶段 y/z 平移步长（m）
    coarse_ty_step: 0.05
    coarse_tz_step: 0.05
    # Coarse阶段 x 平移步长（m）
    coarse_tx_step: 0.05
    # 是否打印每条线的匹配诊断
    log_line_debug: false


# ========================================
# 可视化配置
# ========================================
visualization:
  point_size: 2
  line_width: 2
  show_edges: true
  show_lines: true
  show_projections: true
